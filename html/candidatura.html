<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Candidatura | SINE Itatiaia</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <header>

        <h1>SINE Itatiaia</h1>

        <p>Formulário de Candidatura</p>

    </header>

    <div class="container">

        <div class="formulario">

            <a href="detalhes.html" class="voltar">
                ← Voltar para vaga
            </a>

            <h2>Candidatura</h2>

            <p class="subtitulo">
                Preencha seus dados para se candidatar à vaga.
            </p>

            <form>

                <div class="grupo">

                    <label>Nome Completo</label>

                    <input type="text" placeholder="Digite seu nome">

                </div>

                <div class="duas-colunas">

                    <div class="grupo">

                        <label>CPF</label>

                        <input type="text" placeholder="000.000.000-00">

                    </div>

                    <div class="grupo">

                        <label>Data de Nascimento</label>

                        <input type="date">

                    </div>

                </div>

                <div class="duas-colunas">

                    <div class="grupo">

                        <label>E-mail</label>

                        <input type="email">

                    </div>

                    <div class="grupo">

                        <label>Telefone</label>

                        <input type="tel">

                    </div>

                </div>

                <div class="grupo">

                    <label>Endereço</label>

                    <input type="text">

                </div>

                <div class="grupo">

                    <label>Escolaridade</label>

                    <select>

                        <option>Selecione</option>

                        <option>Ensino Fundamental</option>

                        <option>Ensino Médio</option>

                        <option>Técnico</option>

                        <option>Superior Incompleto</option>

                        <option>Superior Completo</option>

                        <option>Pós-graduação</option>

                    </select>

                </div>

                <div class="grupo">

                    <label>Experiência Profissional</label>

                    <textarea rows="5" placeholder="Descreva resumidamente sua experiência profissional."></textarea>

                </div>

                <div class="grupo">

                    <label>Anexar Currículo (PDF)</label>

                    <input type="file">

                </div>

                <div class="grupo">

                    <label>Mensagem (Opcional)</label>

                    <textarea rows="4"></textarea>

                </div>

                <div class="checkbox">

                    <input type="checkbox">

                    <span>
                        Declaro que as informações fornecidas são verdadeiras e autorizo o tratamento dos meus dados
                        para fins de recrutamento e seleção.
                    </span>

                </div>

                <button type="submit">

                    Enviar candidatura

                </button>

            </form>

        </div>

    </div>

    <footer>

        <p>© 2026 Prefeitura de Itatiaia • SINE Itatiaia</p>

    </footer>

</body>

</html>
